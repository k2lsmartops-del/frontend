<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1C2E4F" />
    <title>Hors ligne — K2L SmartOPs</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #F3F4F6;
        color: #1F2937;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
      }
      .container { max-width: 360px; }
      .icon {
        width: 80px; height: 80px; margin: 0 auto 1.5rem;
        border-radius: 20px; background: #1C2E4F;
        display: flex; align-items: center; justify-content: center;
      }
      .icon svg { width: 40px; height: 40px; color: white; }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { font-size: 0.875rem; color: #4B5563; margin-bottom: 1.5rem; line-height: 1.5; }
      button {
        background: #2B7CD3; color: white; border: none; border-radius: 12px;
        padding: 0.75rem 2rem; font-size: 0.9rem; font-weight: 500; cursor: pointer;
      }
      button:active { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01" />
        </svg>
      </div>
      <h1>Vous êtes hors ligne</h1>
      <p>Pas de connexion Internet. Vos données en attente seront synchronisées automatiquement dès le retour en ligne.</p>
      <button onclick="window.location.reload()">Réessayer</button>
    </div>
  </body>
</html>
